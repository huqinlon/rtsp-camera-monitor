name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Thanks for suggesting this feature!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature
      placeholder: Describe the feature you'd like to see...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful?
      placeholder: This feature would be useful because...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternatives you've considered
      placeholder: I've considered...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the feature
      placeholder: Additional context...
